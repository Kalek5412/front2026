    <div class="container-xxl position-relative bg-white d-flex p-0">
        <!-- Sign Up Start -->
        <div class="container-fluid">
            <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
                <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
                    <div class="bg-light rounded p-4 p-sm-5 my-4 mx-3">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <a href="#" class="">
                                <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>CREAR USUARIO</h3>
                            </a>
                            
                        </div>
                        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" formControlName="nombre" placeholder="jhondoe">
                                <label for="floatingText">Username</label>
                            </div>
                                <div class="form-floating mb-3">
                                <input type="text" class="form-control" formControlName="nombreUsuario" placeholder="jhondoe">
                                <label for="floatingText">Username</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" formControlName="email" placeholder="jhondoe">
                                <label for="floatingText">email</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" formControlName="password" placeholder="Password">
                                <label for="floatingPassword">Password</label>
                            </div>
                            <button type="submit" class="btn btn-primary py-3 w-100 mb-4" [disabled]="registerForm.invalid">REGISTRAR</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
        <!-- Sign Up End -->
    </div>
